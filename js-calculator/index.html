<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semi-Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="top-label"><em>Semi-Scientific</em></div>

    <!-- Display -->
    <input type="text" id="display" class="display" disabled>

    <!-- Scientific buttons -->
    <div class="scientific-btns">
      <button class="func-btn" onclick="append('(')">(</button>
      <button class="func-btn" onclick="append(')')">)</button>
      <button class="func-btn" onclick="sqrt()">√</button>
      <button class="func-btn" onclick="power2()">x²</button>
      <button class="func-btn" onclick="powerY()">xʸ</button>
      <button class="func-btn" onclick="factorial()">x!</button>
      <button class="func-btn" onclick="log()">log</button>
      <button class="func-btn" onclick="ln()">ln</button>
      <button class="func-btn" onclick="append('Math.PI')">π</button>
      <button class="func-btn" onclick="append('Math.E')">e</button>
    </div>

    <!-- Main buttons + operators -->
    <div class="main-grid">
      <div class="numbers">
        <button class="num-btn" onclick="append('7')">7</button>
        <button class="num-btn" onclick="append('8')">8</button>
        <button class="num-btn" onclick="append('9')">9</button>
        <button class="num-btn" onclick="append('4')">4</button>
        <button class="num-btn" onclick="append('5')">5</button>
        <button class="num-btn" onclick="append('6')">6</button>
        <button class="num-btn" onclick="append('1')">1</button>
        <button class="num-btn" onclick="append('2')">2</button>
        <button class="num-btn" onclick="append('3')">3</button>
        <button class="num-btn zero" onclick="append('0')">0</button>
        <button class="num-btn" onclick="append('.')">.</button>
        <button class="func-btn" onclick="clearAll()">C</button>
        <button class="func-btn" onclick="backspace()">←</button>
      </div>

      <div class="operators">
        <button class="op-btn" onclick="append('/')">÷</button>
        <button class="op-btn" onclick="append('*')">×</button>
        <button class="op-btn" onclick="append('-')">–</button>
        <button class="op-btn" onclick="append('+')">+</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
