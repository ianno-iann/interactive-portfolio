<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Rock-Paper-Scissors Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Rock-Paper-Scissors</h1>
  <div class="game-container">
    <div id="result"></div>
    <div class="choices">
      <button class="choice" data-choice="rock">🪨 Rock</button>
      <button class="choice" data-choice="paper">📄 Paper</button>
      <button class="choice" data-choice="scissors">✂️ Scissors</button>
    </div>
    <div class="scoreboard">
      <div>User: <span id="userScore">0</span></div>
      <div>Computer: <span id="compScore">0</span></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
